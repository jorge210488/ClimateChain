name: Contracts Quality Gates

on:
  pull_request:
    paths:
      - "contracts/**"
      - "shared/abi/**"
      - ".github/workflows/contracts-quality-gates.yml"
  push:
    branches:
      - main
    paths:
      - "contracts/**"
      - "shared/abi/**"
      - ".github/workflows/contracts-quality-gates.yml"

jobs:
  contracts-stage4-gates:
    name: contracts-stage4-gates
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.10.0"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: |
          python -m pip install --upgrade pip
          python -m pip install slither-analyzer

      - name: Install dependencies
        run: npm ci

      - name: Stage 04 full gate
        run: npm run stage4:check

      - name: ABI drift gate
        run: |
          if [[ -n "$(git status --porcelain ../shared/abi)" ]]; then
            echo "Detected ABI drift after stage4:check. Run 'npm run artifacts:sync' and commit shared/abi updates."
            git --no-pager status --short ../shared/abi
            exit 1
          fi

      - name: Full static analysis report (non-blocking)
        continue-on-error: true
        run: npm run analyze:static:full | tee static-analysis-full.log

      - name: Upload full static analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-static-analysis-full
          path: contracts/static-analysis-full.log
